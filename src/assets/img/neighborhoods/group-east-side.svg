<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#0a3560"/>
      <stop offset="100%" stop-color="#004d91"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Institutional building silhouette -->
  <g fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5">
    <rect x="200" y="280" width="400" height="90" rx="2"/>
    <rect x="240" y="260" width="320" height="20"/>
    <!-- Columns -->
    <line x1="260" y1="280" x2="260" y2="370"/>
    <line x1="320" y1="280" x2="320" y2="370"/>
    <line x1="380" y1="280" x2="380" y2="370"/>
    <line x1="440" y1="280" x2="440" y2="370"/>
    <line x1="500" y1="280" x2="500" y2="370"/>
    <line x1="560" y1="280" x2="560" y2="370"/>
    <!-- Pediment -->
    <path d="M280 260 L400 230 L520 260"/>
  </g>
  <!-- Ground -->
  <path d="M0 380 Q400 365 800 380 L800 450 L0 450Z" fill="rgba(255,255,255,0.04)"/>
  <!-- Text -->
  <text x="400" y="185" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="Inter,Helvetica,sans-serif" font-size="14" font-weight="700" letter-spacing="4">EAST SIDE</text>
  <text x="400" y="210" text-anchor="middle" fill="rgba(232,117,48,0.5)" font-family="Inter,Helvetica,sans-serif" font-size="11" letter-spacing="2">WHITE PLAINS</text>
</svg>
