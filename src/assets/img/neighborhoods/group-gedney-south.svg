<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d3b2a"/>
      <stop offset="100%" stop-color="#0a4a3a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Tree canopy / green residential feel -->
  <g fill="rgba(255,255,255,0.06)">
    <circle cx="80" cy="280" r="40"/>
    <circle cx="140" cy="270" r="35"/>
    <circle cx="220" cy="285" r="42"/>
    <circle cx="310" cy="275" r="38"/>
    <circle cx="400" cy="270" r="45"/>
    <circle cx="490" cy="280" r="36"/>
    <circle cx="570" cy="268" r="40"/>
    <circle cx="650" cy="278" r="34"/>
    <circle cx="730" cy="272" r="38"/>
  </g>
  <g fill="rgba(255,255,255,0.04)">
    <circle cx="110" cy="310" r="30"/>
    <circle cx="260" cy="315" r="35"/>
    <circle cx="450" cy="308" r="32"/>
    <circle cx="610" cy="312" r="28"/>
    <circle cx="750" cy="305" r="32"/>
  </g>
  <!-- Street / path -->
  <path d="M0 360 Q200 350 400 355 Q600 360 800 345" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <!-- Ground -->
  <path d="M0 375 Q400 360 800 370 L800 450 L0 450Z" fill="rgba(255,255,255,0.03)"/>
  <!-- Text -->
  <text x="400" y="195" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="Inter,Helvetica,sans-serif" font-size="14" font-weight="700" letter-spacing="4">GEDNEY &amp; SOUTH SIDE</text>
  <text x="400" y="220" text-anchor="middle" fill="rgba(232,117,48,0.5)" font-family="Inter,Helvetica,sans-serif" font-size="11" letter-spacing="2">WHITE PLAINS</text>
</svg>
