    <circle cx="120" cy="310" r="22"/>
    <circle cx="180" cy="305" r="18"/>
    <circle cx="350" cy="300" r="25"/>
    <circle cx="410" cy="308" r="16"/>
    <circle cx="550" cy="285" r="20"/>
