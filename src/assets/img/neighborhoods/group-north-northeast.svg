  </g>
  <!-- Text -->
  <text x="400" y="195" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="Inter,Helvetica,sans-serif" font-size="14" font-weight="700" letter-spacing="4">NORTH &amp; NORTHEAST</text>
  <text x="400" y="220" text-anchor="middle" fill="rgba(232,117,48,0.5)" font-family="Inter,Helvetica,sans-serif" font-size="11" letter-spacing="2">WHITE PLAINS</text>
